experiment:
  name: line_breaks_experiment
  seed: 1729
  device: mps

task:
  name: line_break_prediction
  seq_len: 60
  vocab_size: 130
  line_size: 60

data:
  batch_size: 512
  eval_batch_size: 1024
  generate_on_the_fly: true
  fixed_eval_seed: 419

model:
  n_layers: 2
  n_heads: 4
  d_model: 128
  d_head: 32
  d_mlp: 512
  act_fn: gelu
  normalization_type: LN
  positional_embedding_type: standard

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 0.00000001

training:
  num_steps: 10000
  grad_clip_norm: 1.0

scheduler:
  name: cosine
  warmup_steps: 500
  min_lr: 0.0001

logging:
  log_every: 100
  eval_every: 500
  save_every: 1000

paths:
  output_dir: results/line_breaks_results