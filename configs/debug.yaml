experiment:
  name: debug
  seed: 1729
  device: cpu

task:
  name: line_break_prediction
  seq_len: 20
  num_token_lengths: 8
  vocab_size: 84
  line_size: 30
  loss_type: "standard" #OR newline_binary

data:
  batch_size: 32
  eval_batch_size: 1024
  fixed_eval_seed: 419
  generate_on_the_fly: true

model:
  n_layers: 3
  n_heads: 2
  d_model: 64
  d_head: 32
  d_mlp: 128
  act_fn: gelu
  normalization_type: LN
  positional_embedding_type: standard

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0
  betas: [0.9, 0.95]
  eps: 0.00000001

training:
  num_steps: 10_000
  grad_clip_norm: 1.0

scheduler:
  name: constant
  warmup_steps: 0

logging:
  log_every: 100
  eval_every: 500
  save_every: 10000

paths:
  output_dir: results/debug