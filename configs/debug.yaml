experiment:
  name: debug
  seed: 1729
  device: mps

task:
  name: line_break_prediction
  seq_len: 20
  vocab_size: 82
  line_size: 20

data:
  batch_size: 32
  eval_batch_size: 64
  fixed_eval_seed: 419
  generate_on_the_fly: true

model:
  n_layers: 2
  n_heads: 2
  d_model: 64
  d_head: 32
  d_mlp: 128
  act_fn: gelu
  normalization_type: LN
  positional_embedding_type: standard

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0
  betas: [0.9, 0.95]
  eps: 0.00000001

training:
  num_steps: 100
  grad_clip_norm: 1.0

scheduler:
  name: constant
  warmup_steps: 0

logging:
  log_every: 10
  eval_every: 50
  save_every: 100

paths:
  output_dir: results/debug